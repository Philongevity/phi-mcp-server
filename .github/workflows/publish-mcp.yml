name: Publish (npm + MCP Registry)

# Durable, secret-light publish for the Phi Longevity PRISM MCP server.
#
# TWO ways to run — both idempotent and safely re-runnable:
#   1. Push a version tag:      git tag v0.6.4 && git push origin v0.6.4
#   2. Manual re-run/dispatch:  Actions → this workflow → "Run workflow"
#      (optional `version` input; defaults to the version in package.json on the
#      chosen ref). Use this to FINISH a registry publish after npm was published
#      out-of-band, or to recover from any transient failure — NO re-tag needed.
#
# Publishing model:
#   - npm publish uses NPM_TOKEN if present; if absent it is skipped gracefully
#     (publish npm out-of-band, then dispatch this workflow to finish the registry).
#   - MCP Registry publish uses GitHub Actions OIDC — no secret, no device-code.
#
# The registry validates that the npm version actually exists, so the flow waits
# for npm to be readable, then publishes the registry with retry + idempotent
# success detection. The ONLY red outcome is a genuine, persistent outage — and
# recovery from that is a one-click re-run (workflow_dispatch), not a re-tag.
#
# server.json version + packages[].version + package.json version must all match
# the resolved version; a mismatch fails fast so npm and the registry never drift.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.6.4). Leave blank to use package.json on this ref."
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for MCP Registry OIDC auth
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve target version (tag or dispatch input or package.json)
        id: ver
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
            [ -z "$V" ] && V="$(node -p "require('./package.json').version")"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved target version: $V (trigger=${GITHUB_EVENT_NAME})"

      - name: Verify package + server versions all match the target
        run: |
          V="${{ steps.ver.outputs.version }}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          SRV_VERSION="$(node -p "require('./server.json').version")"
          SRV_PKG_VERSION="$(node -p "require('./server.json').packages[0].version")"
          echo "target=$V package.json=$PKG_VERSION server.json=$SRV_VERSION server.packages=$SRV_PKG_VERSION"
          if [ "$V" != "$PKG_VERSION" ] || [ "$V" != "$SRV_VERSION" ] || [ "$V" != "$SRV_PKG_VERSION" ]; then
            echo "::error::Version mismatch — target, package.json, and server.json (both version fields) must all equal $V"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Zero-config smoke (stdio spawn → tools/list must succeed with built-in key)
        run: |
          node -e '
            const { spawn } = require("child_process");
            const p = spawn("node", ["dist/index.js"], { stdio: ["pipe","pipe","inherit"] });
            let buf = "";
            p.stdout.on("data", d => { buf += d.toString(); });
            p.stdin.write(JSON.stringify({jsonrpc:"2.0",id:1,method:"initialize",params:{protocolVersion:"2025-06-18",capabilities:{},clientInfo:{name:"ci",version:"1"}}})+"\n");
            setTimeout(() => {
              p.stdin.write(JSON.stringify({jsonrpc:"2.0",id:2,method:"tools/list"})+"\n");
            }, 500);
            setTimeout(() => {
              p.kill();
              if (!/"tools"/.test(buf)) { console.error("smoke FAILED — no tools in response"); process.exit(1); }
              console.log("smoke OK — tools/list responded");
            }, 2500);
          '

      - name: Publish to npm (idempotent — skip if this version is already published)
        id: npm
        run: |
          V="${{ steps.ver.outputs.version }}"
          PUBLISHED="$(npm view @phi-longevity/mcp-server@${V} version 2>/dev/null || true)"
          if [ "$PUBLISHED" = "$V" ]; then
            echo "npm already has ${V} — skipping publish (idempotent)."
            echo "npm_ready=true" >> "$GITHUB_OUTPUT"
          elif [ -n "${NODE_AUTH_TOKEN}" ]; then
            npm publish --access public
            echo "npm_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::npm ${V} is not on npm and NPM_TOKEN is absent — skipping npm AND registry publish. Publish npm out-of-band, then re-run this workflow (Actions → Run workflow) to finish the registry. This is NOT a failure."
            echo "npm_ready=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        if: steps.npm.outputs.npm_ready == 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Wait for npm to be readable (authoritative registry-JSON check, backoff to ~20 min)
        if: steps.npm.outputs.npm_ready == 'true'
        run: |
          V="${{ steps.ver.outputs.version }}"
          # Poll the npm REGISTRY JSON directly (reflects the write; more consistent
          # than the CLI cache) AND `npm view` as a fallback. Backoff caps at ~20 min,
          # which absorbs any realistic propagation lag so this step effectively never
          # fails for a genuinely-published version.
          for i in $(seq 1 40); do
            J="$(curl -fsSL "https://registry.npmjs.org/@phi-longevity/mcp-server/${V}" 2>/dev/null | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{process.stdout.write((JSON.parse(s).version)||"")}catch{process.stdout.write("")}})' 2>/dev/null || true)"
            V2="$(npm view @phi-longevity/mcp-server@${V} version 2>/dev/null || true)"
            if [ "$J" = "$V" ] || [ "$V2" = "$V" ]; then echo "npm has ${V} (attempt $i)"; exit 0; fi
            SLEEP=$(( i < 10 ? 10 : 30 ))
            echo "waiting for npm to propagate ${V} (attempt $i; sleep ${SLEEP}s)..."; sleep $SLEEP
          done
          echo "::error::npm did not become readable for ${V} within ~20 min — this indicates an npm outage/propagation problem, not a config issue. Re-run this workflow (Actions → Run workflow) once npm shows the version; no re-tag needed."
          exit 1

      - name: Authenticate to MCP Registry (OIDC — no secret)
        if: steps.npm.outputs.npm_ready == 'true'
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry (retry + idempotent — already-published counts as success)
        if: steps.npm.outputs.npm_ready == 'true'
        run: |
          V="${{ steps.ver.outputs.version }}"
          for attempt in 1 2 3 4 5; do
            # `if` guard suspends `set -e` so a failed attempt doesn't abort the step.
            if OUT="$(./mcp-publisher publish 2>&1)"; then RC=0; else RC=$?; fi
            echo "$OUT"
            if [ $RC -eq 0 ]; then echo "registry publish OK (attempt $attempt)"; exit 0; fi
            # Idempotent: if the registry already has this version, treat as success.
            if echo "$OUT" | grep -qiE "already (exists|published)|version .*exists|duplicate"; then
              echo "registry already has ${V} — treating as success (idempotent)."; exit 0
            fi
            echo "registry publish attempt $attempt failed (rc=$RC) — retrying in 30s..."; sleep 30
          done
          # Final authoritative check before declaring failure: did it actually land?
          LATEST="$(curl -fsSL "https://registry.modelcontextprotocol.io/v0/servers?search=philongevity" 2>/dev/null | grep -o "\"version\":\"${V}\"" | head -1 || true)"
          if [ -n "$LATEST" ]; then echo "registry shows ${V} despite publish errors — success."; exit 0; fi
          echo "::error::MCP Registry publish failed after retries for ${V}. npm is published, so re-run this workflow (Actions → Run workflow) to retry the registry step only — no re-tag, no device-code."
          exit 1

      - name: Registry publish skipped notice
        if: steps.npm.outputs.npm_ready != 'true'
        run: echo "::notice::Registry publish skipped because npm ${{ steps.ver.outputs.version }} is not yet on npm (no NPM_TOKEN). Workflow is green by design — publish npm out-of-band, then re-run this workflow (Actions → Run workflow) to finish the registry."
